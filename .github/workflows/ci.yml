name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MyHDL, pytest and Icarus (for the compile check)
        run: |
          python -m pip install --quiet myhdl pytest
          python -m pip install -e .
          sudo apt-get update -qq && sudo apt-get install -y -qq iverilog
      - name: Assert co-simulation is available (must not silently skip)
        run: python -c "from tests import cosim; assert cosim.have_cosim(), 'cosim VPI unavailable in CI'; print('cosim source:', cosim._VPI_SRC)"
      - name: Simulate + convert/compile + co-simulation checks
        run: pytest -q -rs
